# Primis local development services.
# This file is for local development only. No production credentials or cloud resources.
#
# Usage:
#   docker compose up -d db       — start Postgres in the background
#   docker compose down           — stop all services
#   docker compose down -v        — stop and remove volumes (DESTRUCTIVE)
#
# See database/README.md for full setup instructions.

services:
  db:
    image: postgres:16-alpine
    container_name: primis_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: primis
      POSTGRES_PASSWORD: primis
      POSTGRES_DB: primis_dev
    volumes:
      - primis_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primis -d primis_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  primis_db_data:
    name: primis_db_data
