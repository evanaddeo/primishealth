name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege baseline: read-only access to repo contents only.
# No AWS credentials, no deployment permissions, no secrets.
# Deployment workflows are Phase Z and will live in separate workflow files.
permissions:
  contents: read

jobs:
  checks:
    name: Lint, Type Check, Test, Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check
